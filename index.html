<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="漢字得点力">
<meta name="theme-color" content="#1a73e8">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon.svg">
<title>漢字得点力</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue: #1a73e8;
  --green: #34a853;
  --red: #ea4335;
  --orange: #f29900;
  --gray: #5f6368;
  --light: #f8f9fa;
  --border: #e0e0e0;
  --text: #202124;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --nav-h: 60px;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
  background: #fff;
  color: var(--text);
  display: flex;
  flex-direction: column;
}

/* ===== TOP HEADER ===== */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  padding-top: calc(12px + env(safe-area-inset-top, 0px));
  border-bottom: 1px solid var(--border);
  background: #fff;
  flex-shrink: 0;
}

.top-title { font-size: 17px; font-weight: 700; color: var(--text); }

.level-chip {
  background: var(--blue);
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  padding: 5px 12px;
  border-radius: 20px;
}

/* ===== SCROLL AREA ===== */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px);
}

/* ===== BOTTOM NAV ===== */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: calc(var(--nav-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: #fff;
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  cursor: pointer;
  color: var(--gray);
  transition: color 0.15s;
  padding-top: 4px;
}

.nav-item.active { color: var(--blue); }
.nav-icon { font-size: 22px; line-height: 1; }
.nav-label { font-size: 10px; font-weight: 600; }

/* ===== SCREENS ===== */
.screen { display: none; }
.screen.active { display: block; }

/* ===== HOME SCREEN ===== */
.home-wrap { padding: 16px; }

.today-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--gray);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.sets-row {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}

.set-tile {
  flex: 1;
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 16px 10px;
  text-align: center;
}

.set-tile.done { border-color: var(--green); background: #f0faf1; }
.set-tile.next { border-color: var(--blue); background: #f0f6ff; }

.set-num { font-size: 10px; color: var(--gray); font-weight: 700; margin-bottom: 6px; text-transform: uppercase; }
.set-icon { font-size: 20px; margin-bottom: 4px; }
.set-val { font-size: 20px; font-weight: 700; }
.set-val.done { color: var(--green); }

.alert-box {
  background: #fff8e1;
  border: 1px solid var(--orange);
  border-radius: 12px;
  padding: 12px 14px;
  font-size: 14px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.alert-count { font-weight: 700; color: #e65100; }

.mini-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 20px;
}

.mini-stat {
  background: var(--light);
  border-radius: 12px;
  padding: 14px 8px;
  text-align: center;
}

.mini-val { font-size: 22px; font-weight: 700; }
.mini-label { font-size: 10px; color: var(--gray); margin-top: 2px; }

.btn-primary {
  display: block;
  width: 100%;
  padding: 18px;
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 16px;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  margin-bottom: 10px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.btn-primary:active { opacity: 0.85; }
.btn-primary:disabled { background: #ccc; }

.btn-secondary {
  display: block;
  width: 100%;
  padding: 16px;
  background: #fff;
  color: var(--red);
  border: 2px solid var(--red);
  border-radius: 16px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.btn-secondary:active { opacity: 0.8; }

/* ===== QUIZ SCREEN ===== */
.quiz-wrap { padding: 16px; min-height: 100%; }

.quiz-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.q-progress { font-size: 13px; font-weight: 700; color: var(--gray); }
.q-timer { font-size: 20px; font-weight: 700; min-width: 52px; text-align: right; }
.q-timer.warn { color: var(--red); }

.progress-bar {
  height: 5px;
  background: var(--border);
  border-radius: 3px;
  margin-bottom: 20px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--blue);
  border-radius: 3px;
  transition: width 0.35s ease;
}

.q-badges { display: flex; gap: 6px; margin-bottom: 14px; }

.badge {
  padding: 4px 11px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
}

.badge-yomi { background: #e8f0fe; color: #1a73e8; }
.badge-kaki { background: #fce8e6; color: #c5221f; }
.badge-review { background: #fff3e0; color: #e65100; }

/* QUESTION CARD */
.q-card {
  background: var(--light);
  border-radius: 20px;
  padding: 28px 20px;
  text-align: center;
  margin-bottom: 20px;
  min-height: 130px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.q-main { font-size: 38px; font-weight: 700; line-height: 1.3; }
.q-sub { font-size: 17px; color: var(--gray); margin-top: 6px; }
.q-hint { font-size: 14px; color: var(--gray); margin-top: 4px; }

/* READING INPUT */
.yomi-input-wrap { margin-bottom: 16px; }

.q-input {
  width: 100%;
  font-size: 28px;
  padding: 16px;
  border: 2px solid var(--border);
  border-radius: 14px;
  outline: none;
  text-align: center;
  font-family: inherit;
  background: #fff;
  transition: border-color 0.15s;
  -webkit-appearance: none;
}

.q-input:focus { border-color: var(--blue); }
.q-input.correct { border-color: var(--green); background: #f0faf1; }
.q-input.wrong { border-color: var(--red); background: #fff0ef; }

/* CANVAS AREA */
.canvas-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 16px;
}

#drawing-canvas {
  border-radius: 16px;
  border: 2px solid var(--border);
  display: block;
  touch-action: none;
  cursor: crosshair;
}

.canvas-controls {
  display: flex;
  gap: 10px;
  margin-top: 12px;
  width: 100%;
}

.btn-canvas-clear {
  flex: 1;
  padding: 14px;
  border: 2px solid var(--border);
  border-radius: 14px;
  background: #fff;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.btn-canvas-done {
  flex: 2;
  padding: 14px;
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

/* REVEAL AREA (after drawing) */
.reveal-wrap { margin-bottom: 16px; }

.reveal-split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 14px;
}

.reveal-panel {
  border-radius: 16px;
  overflow: hidden;
  border: 2px solid var(--border);
}

.reveal-panel label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  text-align: center;
  padding: 6px;
  background: var(--light);
  color: var(--gray);
}

.reveal-kanji-box {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px;
  font-size: 48px;
  font-weight: 700;
  min-height: 90px;
}

.reveal-canvas-box {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px;
  min-height: 90px;
}

.assess-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.btn-assess {
  padding: 24px 10px;
  border: none;
  border-radius: 18px;
  font-size: 20px;
  font-weight: 700;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: transform 0.1s, opacity 0.1s;
  line-height: 1.3;
}

.btn-assess:active { transform: scale(0.95); }
.btn-correct { background: var(--green); color: #fff; }
.btn-wrong-ans { background: var(--red); color: #fff; }

/* FEEDBACK */
.feedback-box {
  padding: 16px;
  border-radius: 14px;
  font-size: 15px;
  line-height: 1.6;
  margin-bottom: 16px;
}

.feedback-box.correct { background: #f0faf1; color: #1b5e20; }
.feedback-box.wrong { background: #fff0ef; color: #b71c1c; }
.feedback-ans { font-size: 26px; font-weight: 700; display: block; margin-top: 6px; }
.feedback-detail { font-size: 13px; color: var(--gray); display: block; margin-top: 4px; }

.btn-next {
  display: block;
  width: 100%;
  padding: 18px;
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 16px;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.btn-next:active { opacity: 0.85; }

/* ===== RESULT ===== */
.result-card {
  text-align: center;
  padding: 36px 20px 28px;
  background: var(--light);
  border-radius: 20px;
  margin-bottom: 20px;
}

.result-score { font-size: 72px; font-weight: 700; line-height: 1; }
.result-score.perfect { color: var(--green); }
.result-score.good { color: var(--blue); }
.result-score.poor { color: var(--red); }
.result-msg { font-size: 17px; color: var(--gray); margin-top: 8px; }

.wrong-heading {
  font-size: 12px;
  font-weight: 700;
  color: var(--gray);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}

.wrong-row {
  display: flex;
  align-items: center;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 6px;
  gap: 12px;
}

.wrong-kanji { font-size: 24px; font-weight: 700; }
.wrong-info { flex: 1; }
.wrong-word { font-size: 16px; font-weight: 600; }
.wrong-reading { font-size: 12px; color: var(--gray); }
.wrong-tag { font-size: 11px; color: var(--orange); font-weight: 700; }

/* ===== STATS SCREEN ===== */
.stats-wrap { padding: 16px; }

.section-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--gray);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.week-chart {
  display: flex;
  align-items: flex-end;
  gap: 6px;
  height: 90px;
  margin-bottom: 20px;
  padding: 0 4px;
}

.bar-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  height: 100%;
  gap: 5px;
}

.bar-fill {
  width: 100%;
  border-radius: 5px 5px 0 0;
  background: var(--blue);
  min-height: 3px;
}

.bar-fill.high { background: var(--green); }
.bar-day { font-size: 11px; color: var(--gray); }

.weak-item {
  display: flex;
  align-items: center;
  padding: 14px;
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 8px;
  gap: 12px;
}

.weak-kanji { font-size: 30px; font-weight: 700; min-width: 42px; text-align: center; }
.weak-info { flex: 1; min-width: 0; }
.weak-word { font-size: 16px; font-weight: 600; }
.weak-reading { font-size: 12px; color: var(--gray); }
.weak-pct-wrap { width: 64px; text-align: right; }
.weak-pct-num { font-size: 13px; color: var(--gray); margin-bottom: 4px; }
.weak-bar-bg { background: var(--border); border-radius: 3px; height: 5px; }
.weak-bar-fill { background: var(--red); height: 5px; border-radius: 3px; }

/* ===== REVIEW SCREEN ===== */
.review-wrap { padding: 16px; }

.review-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.review-tile {
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 8px;
  text-align: center;
}

.rt-kanji { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
.rt-reading { font-size: 11px; color: var(--gray); margin-bottom: 8px; }
.rt-dots { display: flex; gap: 4px; justify-content: center; }
.dot { width: 9px; height: 9px; border-radius: 50%; background: var(--border); }
.dot.on { background: var(--green); }

/* ===== EMPTY ===== */
.empty {
  text-align: center;
  padding: 56px 20px;
  color: var(--gray);
}

.empty-icon { font-size: 44px; margin-bottom: 12px; }
.empty-msg { font-size: 15px; }

/* ===== MODAL ===== */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  display: none;
}

.modal-bg.show { display: flex; }

.modal {
  background: #fff;
  border-radius: 24px;
  padding: 40px 28px;
  max-width: 300px;
  width: 90%;
  text-align: center;
}

.modal-icon { font-size: 52px; margin-bottom: 12px; }
.modal-title { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
.modal-sub { font-size: 14px; color: var(--gray); margin-bottom: 28px; }
.modal-btn {
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 14px;
  padding: 14px 36px;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
}

/* ===== 書き問題 読み仮名 ===== */
.q-reading-large {
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.03em;
  margin-bottom: 2px;
}

/* ===== UTIL ===== */
.hidden { display: none !important; }
.mt8 { margin-top: 8px; }
.mt16 { margin-top: 16px; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="top-title" id="top-title">漢字得点力</div>
  <div class="level-chip" id="level-chip">小4</div>
</div>

<!-- SCROLL AREA -->
<div class="scroll-area" id="scroll-area">

  <!-- HOME SCREEN -->
  <div class="screen active" id="screen-home">
    <div class="home-wrap">
      <div class="today-label">今日の進捗</div>
      <div class="sets-row" id="sets-row"></div>
      <div id="review-alert" class="alert-box hidden">
        <span>⚠️</span>
        <span>復習 <span class="alert-count" id="review-count">0</span> 問あります</span>
      </div>
      <div class="mini-stats">
        <div class="mini-stat">
          <div class="mini-val" id="h-today">—</div>
          <div class="mini-label">今日の正答率</div>
        </div>
        <div class="mini-stat">
          <div class="mini-val" id="h-streak">0</div>
          <div class="mini-label">連続学習日</div>
        </div>
        <div class="mini-stat">
          <div class="mini-val" id="h-total">0</div>
          <div class="mini-label">累計問題数</div>
        </div>
      </div>
      <button class="btn-primary" id="btn-go" onclick="startQuiz(false)">学習スタート</button>
      <button class="btn-secondary" onclick="startQuiz(true)">試験形式モード（時間制限）</button>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div class="screen" id="screen-quiz">
    <div class="quiz-wrap" id="quiz-wrap">
      <!-- Dynamically filled -->
    </div>
  </div>

  <!-- STATS SCREEN -->
  <div class="screen" id="screen-stats">
    <div class="stats-wrap">
      <div class="section-title">正答率（過去7日）</div>
      <div class="week-chart" id="week-chart"></div>
      <div class="mini-stats" style="margin-bottom:24px;">
        <div class="mini-stat">
          <div class="mini-val" id="s-total">0</div>
          <div class="mini-label">総問題数</div>
        </div>
        <div class="mini-stat">
          <div class="mini-val" id="s-pct">—</div>
          <div class="mini-label">全体正答率</div>
        </div>
        <div class="mini-stat">
          <div class="mini-val" id="s-level">小4</div>
          <div class="mini-label">現在レベル</div>
        </div>
      </div>
      <div class="section-title">苦手漢字リスト</div>
      <div id="weak-list"></div>
    </div>
  </div>

  <!-- REVIEW SCREEN -->
  <div class="screen" id="screen-review">
    <div class="review-wrap">
      <div class="section-title">復習リスト（3回連続正解で卒業）</div>
      <div id="review-grid"></div>
    </div>
  </div>

</div><!-- /scroll-area -->

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <div class="nav-item active" id="nav-home" onclick="showScreen('home')">
    <div class="nav-icon">🏠</div>
    <div class="nav-label">ホーム</div>
  </div>
  <div class="nav-item" id="nav-stats" onclick="showScreen('stats')">
    <div class="nav-icon">📊</div>
    <div class="nav-label">成績</div>
  </div>
  <div class="nav-item" id="nav-review" onclick="showScreen('review')">
    <div class="nav-icon">📋</div>
    <div class="nav-label">復習リスト</div>
  </div>
</nav>

<!-- LEVEL UP MODAL -->
<div class="modal-bg" id="modal-levelup">
  <div class="modal">
    <div class="modal-icon">🎯</div>
    <div class="modal-title" id="modal-title">レベルアップ！</div>
    <div class="modal-sub" id="modal-sub">正答率80%達成</div>
    <button class="modal-btn" onclick="closeModal()">続ける</button>
  </div>
</div>

<script>
'use strict';

// ══════════════════════════════════════════════════════════════
//  KANJI DATA  （小4〜小6 中学受験頻出）
// ══════════════════════════════════════════════════════════════
const KANJI_DB = {
  4: [
    { kanji:"愛", words:[{w:"愛情",r:"あいじょう",m:"愛する気持ち"},{w:"愛読",r:"あいどく",m:"好んで読むこと"}] },
    { kanji:"案", words:[{w:"案内",r:"あんない",m:"道を教えること"},{w:"提案",r:"ていあん",m:"意見を出すこと"}] },
    { kanji:"以", words:[{w:"以上",r:"いじょう",m:"それよりも上"},{w:"以外",r:"いがい",m:"それを除いたもの"}] },
    { kanji:"位", words:[{w:"位置",r:"いち",m:"場所・立場"},{w:"上位",r:"じょうい",m:"上の順位"}] },
    { kanji:"印", words:[{w:"印刷",r:"いんさつ",m:"紙に文字を刷ること"},{w:"目印",r:"めじるし",m:"目当てのしるし"}] },
    { kanji:"英", words:[{w:"英語",r:"えいご",m:"イギリスの言語"},{w:"英才",r:"えいさい",m:"すぐれた才能"}] },
    { kanji:"栄", words:[{w:"栄光",r:"えいこう",m:"ほまれある輝き"},{w:"繁栄",r:"はんえい",m:"さかえること"}] },
    { kanji:"塩", words:[{w:"塩分",r:"えんぶん",m:"塩の成分"},{w:"食塩",r:"しょくえん",m:"料理に使う塩"}] },
    { kanji:"億", words:[{w:"億円",r:"おくえん",m:"1億の円"},{w:"数億",r:"すうおく",m:"数億という数"}] },
    { kanji:"加", words:[{w:"加算",r:"かさん",m:"足し算"},{w:"参加",r:"さんか",m:"集まりに加わること"}] },

//  STATE

const STORE_KEY = 'kanji_v3';

function todayStr() { return new Date().toISOString().slice(0, 10); }

function fresh() {
  return {
    level: 4, today: todayStr(),
    sets: [{done:false,correct:0,total:0},{done:false,correct:0,total:0},{done:false,correct:0,total:0}],
    reviewList: {}, history: {}, kanjiStats: {},
    streak: 0, lastStudy: null,
    totalAns: 0, totalRight: 0
  };
}

let S = (() => {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return fresh();
    const s = JSON.parse(raw);
    if (s.today !== todayStr()) {
      const prev = s.today;
      s.today = todayStr();
      s.sets = [{done:false,correct:0,total:0},{done:false,correct:0,total:0},{done:false,correct:0,total:0}];
      const yd = new Date(); yd.setDate(yd.getDate()-1);
      s.streak = (prev === yd.toISOString().slice(0,10)) ? (s.streak||0)+1 : 1;
    }
    return s;
  } catch { return fresh(); }
})();

function save() { localStorage.setItem(STORE_KEY, JSON.stringify(S)); }

//  CANVAS CONTROLLER
// ══════════════════════════════════════════════════════════════
class DrawCanvas {
  constructor(el) {
    this.el = el;
    this.strokes = [];
    this.cur = null;
    this.drawing = false;
    this.frozen = false;
    this._init();
  }

  _init() {
    const dpr = window.devicePixelRatio || 1;
    const size = this.el.offsetWidth;
    this.size = size;
    this.dpr = dpr;
    this.el.width = size * dpr;
    this.el.height = size * dpr;
    this.ctx = this.el.getContext('2d');
    this.ctx.scale(dpr, dpr);
    this.ctx.lineCap = 'round';
    this.ctx.lineJoin = 'round';

    const on = (ev, fn) => this.el.addEventListener(ev, fn, { passive: false });
    on('touchstart', e => { e.preventDefault(); if (!this.frozen) this._start(this._pos(e)); });
    on('touchmove',  e => { e.preventDefault(); if (!this.frozen) this._move(this._pos(e)); });
    on('touchend',   e => { e.preventDefault(); this._end(); });
    on('mousedown',  e => { if (!this.frozen) this._start(this._pos(e)); });
    on('mousemove',  e => { if (this.drawing && !this.frozen) this._move(this._pos(e)); });
    on('mouseup',    () => this._end());

    this.redraw();
  }

  _pos(e) {
    const r = this.el.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - r.left, y: t.clientY - r.top };
  }

  _start(p) { this.drawing = true; this.cur = [p]; }

  _move(p) {
    if (!this.drawing) return;
    this.cur.push(p);
    this.redraw();
  }

  _end() {
    if (!this.drawing) return;
    this.drawing = false;
    if (this.cur && this.cur.length) this.strokes.push(this.cur);
    this.cur = null;
  }

  clear() { this.strokes = []; this.cur = null; this.drawing = false; this.frozen = false; this.redraw(); }
  freeze() { this.frozen = true; }
  isEmpty() { return this.strokes.length === 0; }

  snapshot() {
    // Return a small canvas (thumbnail) for display in reveal panel
    const tmp = document.createElement('canvas');
    const sz = 80;
    tmp.width = sz; tmp.height = sz;
    const tctx = tmp.getContext('2d');
    const scale = sz / this.size;
    tctx.scale(scale, scale);
    this._renderTo(tctx, this.size);
    return tmp;
  }

  redraw() { this._renderTo(this.ctx, this.size); }

  _renderTo(ctx, size) {
    ctx.clearRect(0, 0, size, size);

    // Background
    ctx.fillStyle = '#fffef6';
    ctx.fillRect(0, 0, size, size);

    // Grid lines
    ctx.strokeStyle = '#dce3f0';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(size/2, 4); ctx.lineTo(size/2, size-4);
    ctx.moveTo(4, size/2); ctx.lineTo(size-4, size/2);
    ctx.stroke();

    // Diagonal guides
    ctx.strokeStyle = '#eef0f8';
    ctx.setLineDash([4, 6]);
    ctx.beginPath();
    ctx.moveTo(6, 6); ctx.lineTo(size-6, size-6);
    ctx.moveTo(size-6, 6); ctx.lineTo(6, size-6);
    ctx.stroke();
    ctx.setLineDash([]);

    // Border
    ctx.strokeStyle = '#c8d0e0';
    ctx.lineWidth = 2;
    ctx.strokeRect(2, 2, size-4, size-4);

    // Strokes
    ctx.strokeStyle = '#1a1a2e';
    ctx.lineWidth = Math.max(size / 64, 4);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    const all = this.cur ? [...this.strokes, this.cur] : this.strokes;
    for (const pts of all) this._drawStroke(ctx, pts);
  }

  _drawStroke(ctx, pts) {
    if (!pts || pts.length === 0) return;
    ctx.beginPath();
    if (pts.length === 1) {
      ctx.arc(pts[0].x, pts[0].y, ctx.lineWidth/2, 0, Math.PI*2);
      ctx.fillStyle = ctx.strokeStyle;
      ctx.fill();
      return;
    }
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length - 1; i++) {
      const mx = (pts[i].x + pts[i+1].x) / 2;
      const my = (pts[i].y + pts[i+1].y) / 2;
      ctx.quadraticCurveTo(pts[i].x, pts[i].y, mx, my);
    }
    ctx.lineTo(pts[pts.length-1].x, pts[pts.length-1].y);
    ctx.stroke();
  }
}

let dc = null; // active DrawCanvas

// ══════════════════════════════════════════════════════════════
//  QUIZ ENGINE
// ══════════════════════════════════════════════════════════════
let Q = { qs:[], idx:0, wrong:[], exam:false, setIdx:0, timer:null, timeLeft:0 };

function allWords(lvl) {
  const out = [];
  for (let l = 4; l <= lvl; l++) {
    for (const item of (KANJI_DB[l]||[])) {
      for (const w of item.words) out.push({...w, kanji:item.kanji, level:l});
    }
  }
  return out;
}

function shuffle(a) {
  const b = [...a];
  for (let i = b.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [b[i],b[j]] = [b[j],b[i]];
  }
  return b;
}

let _typePool = [];
function pickType() {
  if (!_typePool.length) _typePool = shuffle(['yomi','yomi','kaki','kaki','yomi','kaki','yomi','kaki']);
  return _typePool.pop();
}

function buildQs(n=5) {
  const today = todayStr();
  const av = allWords(S.level);
  const reviewKeys = Object.keys(S.reviewList).filter(k => {
    const r = S.reviewList[k]; return r.nextReview <= today && r.consecutive < 3;
  });
  const qs = [];
  const used = new Set();
  const revN = Math.min(Math.floor(n*0.4), reviewKeys.length);
  for (const k of shuffle(reviewKeys).slice(0, revN)) {
    const found = av.find(w => w.w === k);
    if (found) { qs.push(makeQ(found, true)); used.add(k); }
  }
  for (const w of shuffle(av).filter(w => !used.has(w.w)).slice(0, n-qs.length)) {
    qs.push(makeQ(w, false));
  }
  return shuffle(qs);
}

function makeQ(wo, isReview) {
  const type = pickType();
  return type === 'yomi'
    ? { type:'yomi', isReview, display:wo.w, answer:wo.r, hint:wo.m, wo }
    : { type:'kaki', isReview, display:wo.r, hint:wo.m, answer:wo.w, wo };
}

// 書き問題のヒントから答えの漢字をマスク（□）する
function maskAnswerKanji(hint, answer) {
  let result = hint;
  for (const ch of answer) {
    if (/[\u4e00-\u9fff\u3400-\u4dbf]/.test(ch)) {
      result = result.split(ch).join('□');
    }
  }
  return result;
}

function nextSet() { return S.sets.findIndex(s => !s.done); }

function startQuiz(exam) {
  const si = nextSet();
  if (si === -1) { renderHome(); return; }
  Q.qs = buildQs(5); Q.idx = 0; Q.wrong = [];
  Q.exam = exam; Q.setIdx = si;
  if (exam) { Q.timeLeft = 5*60; startTimer(); }
  showScreen('quiz');
  renderQ();
}

function startTimer() {
  if (Q.timer) clearInterval(Q.timer);
  Q.timer = setInterval(() => {
    Q.timeLeft--;
    const el = document.getElementById('q-timer');
    if (el) {
      const m = Math.floor(Q.timeLeft/60), s = Q.timeLeft%60;
      el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
      el.className = 'q-timer' + (Q.timeLeft <= 30 ? ' warn' : '');
    }
    if (Q.timeLeft <= 0) { clearInterval(Q.timer); Q.timer = null; timeUp(); }
  }, 1000);
}

function timeUp() {
  const q = Q.qs[Q.idx];
  if (!q) return;
  if (q.type === 'kaki') { assess(false); }
  else { doSubmitYomi(true); }
}

// ── render question ──────────────────────────────────────────
function renderQ() {
  const wrap = document.getElementById('quiz-wrap');
  const q = Q.qs[Q.idx];
  const total = Q.qs.length;
  const pct = Math.round((Q.idx / total) * 100);

  const timerHTML = Q.exam
    ? `<div class="q-timer" id="q-timer">5:00</div>`
    : `<div></div>`;

  const badgesHTML = `
    <div class="q-badges">
      <span class="badge ${q.type==='yomi'?'badge-yomi':'badge-kaki'}">${q.type==='yomi'?'読み':'書き'}</span>
      ${q.isReview ? '<span class="badge badge-review">復習</span>' : ''}
    </div>`;

  if (q.type === 'yomi') {
    wrap.innerHTML = `
      <div class="quiz-top">
        <div class="q-progress">${Q.idx+1} / ${total}</div>
        ${timerHTML}
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      ${badgesHTML}
      <div class="q-card">
        <div class="q-main">${q.display}</div>
        <div class="q-hint">読み方をひらがなで答えなさい</div>
      </div>
      <div class="yomi-input-wrap">
        <input id="q-input" class="q-input" type="text" placeholder="ひらがなで入力"
          autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
          oninput="autoSubmitYomi()" onkeydown="if(event.key==='Enter') submitYomi()">
      </div>
      <button class="btn-next" id="btn-submit" onclick="submitYomi()">答え合わせ</button>
    `;
    setTimeout(() => { const inp = document.getElementById('q-input'); if(inp) inp.focus(); }, 100);

  } else {
    // kaki: canvas drawing
    const cSize = Math.min(window.innerWidth - 48, 340);
    wrap.innerHTML = `
      <div class="quiz-top">
        <div class="q-progress">${Q.idx+1} / ${total}</div>
        ${timerHTML}
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      ${badgesHTML}
      <div class="q-card">
        <div class="q-reading-large">「${q.display}」</div>
        <div class="q-hint" style="font-size:15px;margin-top:6px;">（${maskAnswerKanji(q.hint, q.answer)}）</div>
        <div class="q-hint" style="margin-top:8px;">漢字をマス目に書きなさい</div>
      </div>
      <div class="canvas-wrap">
        <canvas id="drawing-canvas" width="${cSize}" height="${cSize}" style="width:${cSize}px;height:${cSize}px;"></canvas>
        <div class="canvas-controls">
          <button class="btn-canvas-clear" onclick="clearCanvas()">消す</button>
          <button class="btn-canvas-done" onclick="revealAnswer()">書けた →</button>
        </div>
      </div>
    `;
    const canvas = document.getElementById('drawing-canvas');
    dc = new DrawCanvas(canvas);
  }
}

function clearCanvas() { if (dc) dc.clear(); }

function autoSubmitYomi() {
  // No auto-submit; user taps button or Enter
}

function norm(s) {
  return (s||'').trim().replace(/\s+/g,'')
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0)-0xFEE0))
    .toLowerCase();
}

function submitYomi(timeupVal) {
  const q = Q.qs[Q.idx];
  const inp = document.getElementById('q-input');
  const userAns = timeupVal ? '' : norm(inp ? inp.value : '');
  const correct = norm(q.answer);
  const ok = userAns === correct;

  // Disable input
  if (inp) { inp.disabled = true; inp.className = 'q-input ' + (ok ? 'correct' : 'wrong'); }

  recordResult(q, ok);
  renderFeedback(q, ok, userAns);
}

function doSubmitYomi(timeup) { submitYomi(timeup); }

function revealAnswer() {
  const q = Q.qs[Q.idx];
  if (!dc) return;
  dc.freeze();

  // Snapshot user drawing
  const snap = dc.snapshot();

  const wrap = document.getElementById('quiz-wrap');
  const total = Q.qs.length;
  const pct = Math.round((Q.idx / total) * 100);
  const timerHTML = Q.exam
    ? `<div class="q-timer ${Q.timeLeft<=30?'warn':''}" id="q-timer">${Math.floor(Q.timeLeft/60)}:${(Q.timeLeft%60).toString().padStart(2,'0')}</div>`
    : `<div></div>`;

  wrap.innerHTML = `
    <div class="quiz-top">
      <div class="q-progress">${Q.idx+1} / ${total}</div>
      ${timerHTML}
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="q-card" style="margin-bottom:16px;">
      <div class="q-sub">「${q.display}」（${q.hint}）</div>
    </div>
    <div class="reveal-wrap">
      <div class="reveal-split">
        <div class="reveal-panel">
          <label>あなたの答え</label>
          <div class="reveal-canvas-box" id="snap-box"></div>
        </div>
        <div class="reveal-panel">
          <label>正解</label>
          <div class="reveal-kanji-box">${q.answer}</div>
        </div>
      </div>
      <div style="font-size:14px;text-align:center;color:var(--gray);margin-bottom:14px;">合っていましたか？</div>
      <div class="assess-row">
        <button class="btn-assess btn-wrong-ans" onclick="assess(false)">✗ 不正解</button>
        <button class="btn-assess btn-correct" onclick="assess(true)">○ 正解</button>
      </div>
    </div>
  `;

  // Put snapshot into box
  const box = document.getElementById('snap-box');
  if (box && snap) box.appendChild(snap);
}

function assess(ok) {
  const q = Q.qs[Q.idx];
  recordResult(q, ok);

  const wrap = document.getElementById('quiz-wrap');
  const total = Q.qs.length;
  const pct = Math.round((Q.idx / total) * 100);
  const timerHTML = Q.exam
    ? `<div class="q-timer ${Q.timeLeft<=30?'warn':''}" id="q-timer">${Math.floor(Q.timeLeft/60)}:${(Q.timeLeft%60).toString().padStart(2,'0')}</div>`
    : `<div></div>`;

  const fbClass = ok ? 'correct' : 'wrong';
  const fbMsg = ok
    ? `<span class="feedback-ans">正解！${q.answer}</span>`
    : `<span class="feedback-ans">正解：${q.answer}</span><span class="feedback-detail">${q.wo.r}（${q.wo.m}）</span>`;

  wrap.innerHTML = `
    <div class="quiz-top">
      <div class="q-progress">${Q.idx+1} / ${total}</div>
      ${timerHTML}
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="q-card" style="margin-bottom:16px;">
      <div class="q-sub">「${q.display}」（${q.hint}）</div>
    </div>
    <div class="feedback-box ${fbClass}">${fbMsg}</div>
    <button class="btn-next" onclick="nextQ()">次へ →</button>
  `;
}

function renderFeedback(q, ok, userAns) {
  const wrap = document.getElementById('quiz-wrap');
  const total = Q.qs.length;
  const pct = Math.round((Q.idx / total) * 100);
  const timerHTML = Q.exam
    ? `<div class="q-timer ${Q.timeLeft<=30?'warn':''}" id="q-timer">${Math.floor(Q.timeLeft/60)}:${(Q.timeLeft%60).toString().padStart(2,'0')}</div>`
    : `<div></div>`;

  const fbClass = ok ? 'correct' : 'wrong';
  const fbMsg = ok
    ? `<span class="feedback-ans">正解！</span>`
    : `<span class="feedback-ans">正解：${q.answer}</span><span class="feedback-detail">あなたの答え：${userAns||'（未入力）'}</span>`;

  wrap.innerHTML = `
    <div class="quiz-top">
      <div class="q-progress">${Q.idx+1} / ${total}</div>
      ${timerHTML}
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="q-card" style="margin-bottom:16px;">
      <div class="q-main">${q.display}</div>
    </div>
    <div class="feedback-box ${fbClass}">${fbMsg}</div>
    <button class="btn-next" onclick="nextQ()">次へ →</button>
  `;
}

function vibrate(pattern) {
  try { if (navigator.vibrate) navigator.vibrate(pattern); } catch(e) {}
}

function recordResult(q, ok) {
  vibrate(ok ? [40] : [60, 40, 60]);
  const wk = q.wo.w;
  if (!S.kanjiStats[wk]) S.kanjiStats[wk] = {correct:0,total:0};
  S.kanjiStats[wk].total++;
  S.totalAns++;

  if (ok) {
    S.kanjiStats[wk].correct++;
    S.totalRight++;
    if (S.reviewList[wk]) {
      S.reviewList[wk].consecutive++;
      if (S.reviewList[wk].consecutive >= 3) delete S.reviewList[wk];
    }
  } else {
    Q.wrong.push(q);
    const nxt = new Date(); nxt.setDate(nxt.getDate()+1);
    if (!S.reviewList[wk]) {
      S.reviewList[wk] = { consecutive:0, nextReview: nxt.toISOString().slice(0,10) };
    } else {
      S.reviewList[wk].consecutive = 0;
      S.reviewList[wk].nextReview = nxt.toISOString().slice(0,10);
    }
  }
  save();
}

function nextQ() {
  Q.idx++;
  if (Q.idx >= Q.qs.length) { finishQuiz(); return; }
  renderQ();
  document.getElementById('scroll-area').scrollTop = 0;
}

function finishQuiz() {
  if (Q.timer) { clearInterval(Q.timer); Q.timer = null; }
  const total = Q.qs.length;
  const wrong = Q.wrong.length;
  const correct = total - wrong;

  S.sets[Q.setIdx] = { done:true, correct, total };

  const td = todayStr();
  if (!S.history[td]) S.history[td] = {correct:0,total:0};
  S.history[td].correct += correct;
  S.history[td].total += total;

  const allDone = S.sets.every(s=>s.done);
  const h = S.history[td];
  let levelUp = false;
  if (allDone && h.total > 0 && h.correct/h.total >= 0.8 && S.level < 6) {
    S.level++;
    levelUp = true;
  }
  save();

  renderResult(correct, total, wrong, levelUp);
  if (levelUp) setTimeout(() => showLevelUp(S.level), 600);
}

function renderResult(correct, total, wrong, levelUp) {
  const wrap = document.getElementById('quiz-wrap');
  const pct = Math.round(correct/total*100);
  const cls = pct===100?'perfect':pct>=60?'good':'poor';
  const msg = pct===100?'満点！':pct>=80?'合格ライン':pct>=60?'もう少し！':'要復習';

  const wrongRows = Q.wrong.map(q => `
    <div class="wrong-row">
      <div class="wrong-kanji">${q.wo.kanji}</div>
      <div class="wrong-info">
        <div class="wrong-word">${q.wo.w}</div>
        <div class="wrong-reading">${q.wo.r}（${q.wo.m}）</div>
      </div>
      <div class="wrong-tag">→ 明日も出題</div>
    </div>
  `).join('');

  const nextBtnHTML = nextSet() !== -1
    ? `<button class="btn-secondary mt8" style="color:var(--blue);border-color:var(--blue);" onclick="resetQuizView();startQuiz(false)">次のセットへ →</button>`
    : '';

  wrap.innerHTML = `
    <div class="result-card">
      <div class="result-score ${cls}">${correct}/${total}</div>
      <div class="result-msg">${msg}（${pct}%）</div>
    </div>
    ${wrong > 0 ? `<div class="wrong-heading">間違えた問題（${wrong}問）</div>${wrongRows}` : ''}
    <button class="btn-primary mt16" onclick="resetQuizView();showScreen('home')">ホームへ</button>
    ${nextBtnHTML}
  `;
}

function resetQuizView() {
  document.getElementById('quiz-wrap').innerHTML = '';
  dc = null;
}

// ══════════════════════════════════════════════════════════════
//  LEVEL UP MODAL
// ══════════════════════════════════════════════════════════════
function showLevelUp(lvl) {
  document.getElementById('modal-title').textContent = `小${lvl}レベルへ！`;
  document.getElementById('modal-sub').textContent = `正答率80%達成 → 小${lvl-1}を卒業`;
  document.getElementById('modal-levelup').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-levelup').classList.remove('show');
}

// ══════════════════════════════════════════════════════════════
//  SCREENS
// ══════════════════════════════════════════════════════════════
function showScreen(name) {
  ['home','quiz','stats','review'].forEach(id => {
    document.getElementById('screen-'+id).classList.toggle('active', id===name);
    const nav = document.getElementById('nav-'+id);
    if (nav) nav.classList.toggle('active', id===name);
  });

  document.getElementById('top-title').textContent =
    name==='home'?'漢字得点力':
    name==='quiz'?'問題':
    name==='stats'?'成績・分析':
    '復習リスト';

  document.getElementById('scroll-area').scrollTop = 0;

  if (name==='home') renderHome();
  if (name==='stats') renderStats();
  if (name==='review') renderReview();
}

// ──  HOME  ─────────────────────────────────────────────────
function renderHome() {
  // Level chip
  document.getElementById('level-chip').textContent = `小${S.level}`;

  // Set tiles
  const row = document.getElementById('sets-row');
  row.innerHTML = S.sets.map((s,i) => {
    const isDone = s.done;
    const isNext = !isDone && S.sets.slice(0,i).every(x=>x.done);
    return `
      <div class="set-tile ${isDone?'done':''} ${isNext?'next':''}">
        <div class="set-num">セット ${i+1}</div>
        <div class="set-icon">${isDone?'✓':isNext?'▶':'○'}</div>
        <div class="set-val ${isDone?'done':''}">${isDone?`${s.correct}/${s.total}`:'—'}</div>
      </div>
    `;
  }).join('');

  // Review alert
  const today = todayStr();
  const revCnt = Object.values(S.reviewList).filter(v => v.nextReview<=today && v.consecutive<3).length;
  const alertEl = document.getElementById('review-alert');
  if (revCnt > 0) {
    alertEl.classList.remove('hidden');
    document.getElementById('review-count').textContent = revCnt;
  } else {
    alertEl.classList.add('hidden');
  }

  // Mini stats
  const h = S.history[today];
  document.getElementById('h-today').textContent = h && h.total>0 ? Math.round(h.correct/h.total*100)+'%' : '—';
  document.getElementById('h-streak').textContent = S.streak || 0;
  document.getElementById('h-total').textContent = S.totalAns || 0;

  // Start button
  const allDone = S.sets.every(s=>s.done);
  const btn = document.getElementById('btn-go');
  btn.disabled = allDone;
  btn.textContent = allDone ? '今日の学習完了！' : '学習スタート';
}

// ──  STATS  ────────────────────────────────────────────────
function renderStats() {
  const days = [];
  for (let i=6; i>=0; i--) {
    const d = new Date(); d.setDate(d.getDate()-i);
    days.push(d.toISOString().slice(0,10));
  }

  const dn = ['日','月','火','水','木','金','土'];
  document.getElementById('week-chart').innerHTML = days.map(dt => {
    const h = S.history[dt];
    const pct = h && h.total>0 ? h.correct/h.total : 0;
    const d = new Date(dt+'T12:00:00');
    const hi = pct >= 0.8;
    return `
      <div class="bar-wrap">
        <div class="bar-fill${hi?' high':''}" style="height:${Math.max(pct*76,pct>0?3:0)}px;"></div>
        <div class="bar-day">${dn[d.getDay()]}</div>
      </div>
    `;
  }).join('');

  document.getElementById('s-total').textContent = S.totalAns || 0;
  document.getElementById('s-pct').textContent = S.totalAns>0 ? Math.round(S.totalRight/S.totalAns*100)+'%' : '—';
  document.getElementById('s-level').textContent = `小${S.level}`;

  const av = allWords(S.level);
  const weak = Object.entries(S.kanjiStats)
    .filter(([,v]) => v.total >= 2)
    .map(([w,v]) => ({w, pct:v.correct/v.total, v}))
    .sort((a,b) => a.pct-b.pct)
    .slice(0,10);

  const wl = document.getElementById('weak-list');
  if (!weak.length) {
    wl.innerHTML = '<div class="empty"><div class="empty-icon">📊</div><div class="empty-msg">問題を解くと苦手リストが表示されます</div></div>';
    return;
  }

  wl.innerHTML = weak.map(({w,pct,v}) => {
    const found = av.find(x => x.w === w);
    const p = Math.round(pct*100);
    return `
      <div class="weak-item">
        <div class="weak-kanji">${found?found.kanji:w[0]}</div>
        <div class="weak-info">
          <div class="weak-word">${w}</div>
          <div class="weak-reading">${found?found.r:''}</div>
        </div>
        <div class="weak-pct-wrap">
          <div class="weak-pct-num">${p}%</div>
          <div class="weak-bar-bg"><div class="weak-bar-fill" style="width:${p}%"></div></div>
        </div>
      </div>
    `;
  }).join('');
}

// ──  REVIEW  ───────────────────────────────────────────────
function renderReview() {
  const av = allWords(S.level);
  const items = Object.entries(S.reviewList).filter(([,v]) => v.consecutive<3);

  const cont = document.getElementById('review-grid');
  if (!items.length) {
    cont.innerHTML = '<div class="empty"><div class="empty-icon">🌟</div><div class="empty-msg">復習リストは空です</div></div>';
    return;
  }

  cont.innerHTML = '<div class="review-grid">' +
    items.map(([w, data]) => {
      const found = av.find(x => x.w === w);
      const cons = data.consecutive || 0;
      const dots = [0,1,2].map(i => `<div class="dot${i<cons?' on':''}"></div>`).join('');
      return `
        <div class="review-tile">
          <div class="rt-kanji">${w}</div>
          <div class="rt-reading">${found?found.r:''}</div>
          <div class="rt-dots">${dots}</div>
        </div>
      `;
    }).join('') +
  '</div>';
}

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════
renderHome();
showScreen('home');

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .catch(err => console.warn('SW:', err));
  });
}
